<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario IA Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --success: #4ecca3; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #clock { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: var(--accent); }
        #next-class-alert { background: rgba(56, 189, 248, 0.15); border: 2px solid var(--accent); padding: 15px; border-radius: 15px; margin: 15px 0; font-weight: bold; display: none; }
        .btn { background: var(--accent); color: #000; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; display: block; margin: 20px 0; border: none; width: 100%; font-size: 1rem; }
        #preview { width: 100%; border-radius: 15px; margin-top: 15px; border: 2px solid var(--accent); display: none; }
        .loader { display: none; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-weight: bold; margin: 10px 0; color: var(--accent); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mi Horario IA</h1>
        <div id="clock">00:00</div>
        <div id="next-class-alert"></div>
        <div id="status">Sube tu horario para empezar</div>
        <div id="loader" class="loader"></div>
        <label for="file-in" class="btn">📷 ACTUALIZAR FOTO / APK</label>
        <input type="file" id="file-in" accept="image/*" style="display:none">
        <img id="preview">
    </div>
    <script>
        let textoExtraidoGlobal = "";
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            if (textoExtraidoGlobal) buscarProximaClase(now);
        }, 1000);

        function buscarProximaClase(fechaActual) {
            const alertBox = document.getElementById('next-class-alert');
            const lineas = textoExtraidoGlobal.split('\n');
            const horaActualMinutos = fechaActual.getHours() * 60 + fechaActual.getMinutes();
            let proximaHoy = ""; let primeraManana = ""; let minMinutos = 9999;

            lineas.forEach(linea => {
                const match = linea.match(/(\d{1,2})[:\.](\d{2})/);
                if (match) {
                    const mins = parseInt(match[1]) * 60 + parseInt(match[2]);
                    if (mins > horaActualMinutos && proximaHoy === "") proximaHoy = linea;
                    if (mins < minMinutos) { minMinutos = mins; primeraManana = linea; }
                }
            });
            if (proximaHoy) {
                alertBox.innerHTML = "<span style='color:var(--success)'>🔔 SIGUIENTE HOY:</span><br>" + proximaHoy;
                alertBox.style.display = "block";
            } else if (primeraManana) {
                alertBox.innerHTML = "<span style='color:var(--accent)'>📅 MAÑANA LUNES:</span><br>" + primeraManana;
                alertBox.style.display = "block";
            }
        }

        document.getElementById('file-in').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            document.getElementById('preview').src = URL.createObjectURL(file);
            document.getElementById('preview').style.display = 'block';
            document.getElementById('loader').style.display = "block";
            try {
                const worker = await Tesseract.createWorker('spa');
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();
                textoExtraidoGlobal = text;
                localStorage.setItem('texto_horario', text);
                document.getElementById('loader').style.display = "none";
                document.getElementById('status').innerText = "✅ HORARIO LISTO";
                const reader = new FileReader();
                reader.onload = () => localStorage.setItem('mi_horario', reader.result);
                reader.readAsDataURL(file);
            } catch (err) { document.getElementById('status').innerText = "❌ ERROR"; }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }
        window.onload = () => {
            const img = localStorage.getItem('mi_horario');
            const txt = localStorage.getItem('texto_horario');
            if (img) { document.getElementById('preview').src = img; document.getElementById('preview').style.display = 'block'; }
            if (txt) textoExtraidoGlobal = txt;
        };
    </script>
</body>
</html>
